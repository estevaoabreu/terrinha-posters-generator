<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Terrinhas Poster Generator</title>
    <link rel="stylesheet" href="css.css" type="text/css" />
    <script src="/p5.min.js"></script>
  </head>
  <body>
    <p>Insere o nome de um Santo:</p>

    <div>
      <input
        type="text"
        id="promptInputSanto"
        placeholder="[São/Santo/Santa]..."
      />
      <input
        type="text"
        id="promptInputLocalidade"
        placeholder="[Nome da localidade]"
      />
      <input
        type="text"
        id="promptPrograma"
        placeholder="[Contéudo do programa]"
      />
      <input
        type="number"
        id="promptNúmeroLogos"
        placeholder="[Número de logos]"
      />
      <input type="text" id="promptInputDia" placeholder="[Data da festa]" />
      <button id="generateBtn">Gerar Imagem</button>
    </div>

    <div id="canvas">
      <p id="status"></p>
      <img id="outputImage" src="" />
    </div>
    <div id="sketch"></div>

    <script src="sketch.js"></script>
    <script src="script.js"></script>
  </body>
</html>
