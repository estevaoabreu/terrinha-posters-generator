<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Terrinhas Poster Generator</title>
    <link rel="stylesheet" href="css.css" type="text/css" />
  </head>
  <body id="start">
    <h1>Gerador de Cartazes para Festas de Terrinhas</h1>
    <p>Clica em qualquer lado para começar</p>
  </body>
  <script lang="js">
    function getRandomColor() {
      const h = Math.floor(Math.random() * 360);
      const s = Math.floor(Math.random() * 50) + 50;
      const l = Math.floor(Math.random() * 40) + 30;
      return `hsl(${h}, ${s}%, ${l}%)`;
    }

    function setRandomGradient() {
      const color1 = getRandomColor();
      const color2 = getRandomColor();
      const isRadial = Math.random() > 0.5;

      let gradient;
      if (isRadial) {
        gradient = `radial-gradient(circle, ${color1}, ${color2})`;
      } else {
        gradient = `linear-gradient(0deg, ${color1}, ${color2})`;
      }

      document.body.style.background = gradient;
    }

    setRandomGradient();

    document.getElementById("start").addEventListener("click", () => {
      window.location.href = "saint-generator.html";
    });
  </script>
</html>
