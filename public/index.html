<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />

    <title>Terrinhas — Gerador de Cartazes</title>
    <link rel="stylesheet" href="css.css" />
  </head>
  <body>
    <div id="container">
      <marquee scrollamount="15" style="background: red; color: yellow; font-family: 'Comic Sans MS'; font-size: 24px; font-weight: bold; padding: 10px; border-bottom: 5px solid white; margin-bottom: 20px;">
        🎇 HÁ BIFANAS! 🎇 CERVEJA A 1€! 🎇 MUSICA BOA E MUITO MAIS! 🎇 TUDO A SALTAR! 🎇
      </marquee>

      <h1>Gerador de Cartazes <br> para Festas da Terrinha</h1>
      
      <p style="background: black; color: lime; font-weight: bold; padding: 10px; border: 2px solid white;">
        Pisca o olho à comissão de festas e clica no botão para começar!
      </p>

      <a href="saint-generator.html" class="botao-entrar">
        ENTRAR NA FESTA

    <script src="randomBg.js"></script>

    <script>
      let frame = 1;
      setInterval(() => {
        document.documentElement.style.setProperty('--cursor-frame', `url('/cursor/cursor${frame}.png') 0 0, auto`);
        frame = frame >= 4 ? 1 : frame + 1;
      }, 200);
    </script>
