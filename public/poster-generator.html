<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terrinhas — Gerador de Cartaz</title>
    <link rel="stylesheet" href="css.css" />
    <script src="fonts.js" defer></script>
    <script src="/p5.min.js"></script>
  </head>
  <body>
    <h2>Insere as informações sobre a festa</h2>
    <input type="text" id="promptInputLocalidade" placeholder="Nome da festa" />

    <textarea
      id="promptPrograma"
      placeholder="Programa (ex: SEXTA: 22h — Quim Barreiros&#10;SÁBADO: 21h — Banda X)"
    ></textarea>

    <input
      type="number"
      id="promptNúmeroLogos"
      placeholder="Nº de logos de patrocinadores"
      min="0"
      step="1"
    />

    <input
      type="text"
      id="promptInputDia"
      placeholder="Data do evento (ex: 23 a 25 de Junho)"
    />

    <button id="generateBtn" type="button">Gerar Cartaz</button>

    <div id="sketch" role="img" aria-label="Cartaz gerado"></div>

    <script src="cores-cidades.js"></script>
    <script src="sketch.js"></script>
    <script src="randomBg.js"></script>
  </body>
</html>
