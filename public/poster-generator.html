<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Terrinhas Poster Generator</title>
    <link rel="stylesheet" href="css.css" type="text/css" />
    <script src="fonts.js"></script>
    <script src="/p5.min.js"></script>
  </head>
  <body>
    <p>Insere as informações sobre a festa:</p>

      <input
        type="text"
        id="promptInputLocalidade"
        placeholder="Nome da festa"
      />
      <textarea
        id="promptPrograma"
        placeholder="Programa"
      ></textarea>
      <input
        type="number"
        id="promptNúmeroLogos"
        placeholder="Número de logos"
        min="0" step="1"
      />
      <input type="text" id="promptInputDia" placeholder="Data" />
      <button id="generateBtn">Gerar Imagem</button>
    </div>

    <div id="sketch"></div>

    <script src="sketch.js"></script>
  </body>
    <script src="randomBg.js"></script>
</html>
