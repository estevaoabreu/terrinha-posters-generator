<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terrinhas — Gerador de Cartaz</title>
    <link rel="stylesheet" href="css.css" />
    <script src="fonts.js" defer></script>
    <script src="p5.min.js"></script>
  </head>
  <body>

    <div class="marquee-bar">
      <marquee scrollamount="12">
        🎨 CRIA O TEU CARTAZ! 🎨 &nbsp;&nbsp; 🖨️ IMPRESSÃO A CORES! 🖨️ &nbsp;&nbsp; 🎇 FESTAS DA TERRINHA 2025! 🎇 &nbsp;&nbsp; 🎨 CRIA O TEU CARTAZ! 🎨 &nbsp;&nbsp;
      </marquee>
    </div>

    <div id="container">
      <div class="win-titlebar">
        <span class="win-title-text"><span class="win-icon">🖼️</span> Ecrã 3 — Gerador de Cartaz</span>
        <div class="win-controls">
          <span class="win-btn">_</span>
          <span class="win-btn">□</span>
          <span class="win-btn">✕</span>
        </div>
      </div>

      <div class="win-content">
        <div class="deco-bar"></div>
        <h1 style="font-size:2.4em; margin-bottom:0.3em;">Gerador de Cartaz</h1>

        <div class="poster-layout">

          <!-- ESQUERDA: FORMULÁRIO -->
          <div class="poster-form-panel">
            <h2>Informações</h2>

            <label class="form-label">📍 Localização da festa</label>
            <input type="text" id="promptInputLocalidade" placeholder="Ex: Aldeia de Cima, Viseu" />

            <label class="form-label">📋 Programa</label>
            <textarea id="promptPrograma" placeholder="Ex: SEXTA: 22h — Quim Barreiros&#10;SÁBADO: 21h — Banda X&#10;DOMINGO: Missa e Arraial"></textarea>

            <label class="form-label">🏷️ Nº de logos</label>
            <input type="number" id="promptNúmeroLogos" placeholder="Ex: 3" min="0" step="1" />

            <label class="form-label">📅 Data</label>
            <input type="text" id="promptInputDia" placeholder="Ex: 23 a 25 de Junho" />

            <button id="generateBtn" type="button" class="botao-gerar">
              🖨️ GERAR CARTAZ
            </button>
          </div>

          <!-- DIREITA: CANVAS / PREVIEW -->
          <div class="poster-preview-panel">
            <p class="poster-preview-label">[ Pré-visualização do Cartaz ]</p>
            <div id="sketch"></div>
          </div>

        </div>

        <div class="deco-bar" style="margin-top:24px;"></div>
      </div>
    </div>

    <script src="cores-cidades.js"></script>
    <script src="sketch.js"></script>
    <script>
      let frame = 1;
      setInterval(() => {
        document.documentElement.style.setProperty('--cursor-frame', `url('/cursor/cursor${frame}.png') 0 0, auto`);
        frame = frame >= 4 ? 1 : frame + 1;
      }, 200);
    </script>
  </body>
</html>
