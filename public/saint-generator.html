<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terrinhas — Escolha o Santo</title>
    <link rel="stylesheet" href="css.css" />
  </head>
  <body>
    <div id="container">
      
      <h2>Escolhe o padroeiro da festa!</h2>

      <div class="input-group">
        <input
          type="text"
          id="promptInputSanto"
          placeholder="Insere o nome de um São/Santo/Santa..."
        />
        <button id="generateBtn">Gerar Imagens</button>
      </div>

      <p id="status"></p>

      <div id="canvas">
        <img class="outputImage" id="img1" />
        <img class="outputImage" id="img2" />
        <img class="outputImage" id="img3" />
      </div>

      <a href="poster-generator.html" class="botao-entrar" style="margin-top: 30px;">
        Continuar para Cartazes =>
      </a>
      
    </div>

    <script src="script.js"></script>
    <script src="randomBg.js"></script>
    <script>
      let frame = 1;
      setInterval(() => {
        document.documentElement.style.setProperty('--cursor-frame', `url('/cursor/cursor${frame}.png') 0 0, auto`);
        frame = frame >= 4 ? 1 : frame + 1;
      }, 200);
    </script>
  </body>
</html>
