<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terrinhas — Escolha o Santo</title>
    <link rel="stylesheet" href="css.css" />
  </head>
  <body>
    <h2>Escolhe o padroeiro da festa!</h2>

    <div>
      <input
        type="text"
        id="promptInputSanto"
        placeholder="Insere o nome de um São/Santo/Santa..."
      />
      <button id="generateBtn">Gerar Imagens</button>
    </div>

    <p id="status"></p>

    <div id="canvas">
      <img class="outputImage" />
      <img class="outputImage" />
      <img class="outputImage" />
    </div>

    <button
      id="continueBtn"
      type="button"
      onclick="window.location.href = 'poster-generator.html'"
    >
      Continuar para Geração de Cartazes =>
    </button>
  </body>
  <script src="script.js"></script>
  <script src="randomBg.js"></script>
  <script lang="js">
    var c = getRandomColor();
    document.documentElement.style.setProperty("--accent-color", c);
    document
      .querySelectorAll("button")
      .forEach((btn) => (btn.style.background = c));
    document.getElementById("promptInputSanto").style.border = "5px solid " + c;
  </script>
</html>
